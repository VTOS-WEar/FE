name: Deploy Frontend

on:
  push:
    branches: [feature/ci-cd, main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name to lowercase
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=/api

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REGISTRY,IMAGE_NAME_LC
          script: |
            # Login to ghcr.io on VPS
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker pull ${REGISTRY}/${IMAGE_NAME_LC}:latest

            # Stop and remove old container
            docker stop vtos-frontend 2>/dev/null || true
            docker rm vtos-frontend 2>/dev/null || true

            # Run new container
            docker run -d \
              --name vtos-frontend \
              --network vtos-network \
              --restart unless-stopped \
              -p 80:80 \
              ${REGISTRY}/${IMAGE_NAME_LC}:latest

            # Clean up old images
            docker image prune -f
